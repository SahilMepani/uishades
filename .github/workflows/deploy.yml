name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Build and deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    # Only deploy when CI (build + Vitest + Playwright) finished green.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 15
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Pin to the exact commit CI verified, not the branch tip,
          # in case another push landed between CI finishing and this run.
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config dist/server/wrangler.json

      - name: Purge Cloudflare edge cache
        # The SSR /[hex] HTML is edge-cached for 30 days (s-maxage=2592000 in
        # src/pages/[hex].astro). Without a purge, already-warm hex URLs keep
        # serving the PREVIOUS build's HTML to crawlers and on first paint for
        # up to 30 days — so any content change (e.g. the Tailwind-default
        # flip) is invisible on hot URLs. Purge the whole zone so the next
        # request re-caches fresh HTML. The home page and /colors/* pages ship
        # fresh with the deploy; this only matters for /[hex].
        #
        # Requires:
        #   - secrets.CLOUDFLARE_ZONE_ID   (the uishades.com zone id)
        #   - secrets.CLOUDFLARE_API_TOKEN scoped to include Zone > Cache Purge
        #
        # Best-effort: the site is already live by this step, so a missing zone
        # id or a token without Cache-Purge scope must not fail the deploy.
        # `continue-on-error` keeps the job green (the failure still surfaces as
        # an annotation), and the empty-id guard skips cleanly rather than
        # POSTing to a malformed `/zones//purge_cache` URL.
        continue-on-error: true
        env:
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CF_ZONE_ID" ]; then
            echo "::warning::CLOUDFLARE_ZONE_ID is not set — skipping edge cache purge."
            exit 0
          fi
          curl --fail --silent --show-error -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
